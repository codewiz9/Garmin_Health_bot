{% extends "base.html" %}
{% block title %}Log In{% endblock %}

{% block content %}
<div class="row mt-5">
    <div class="col-md-6 col-lg-5 m-auto">
        <div class="card shadow-lg feature-card border-0">
            <div class="card-body p-5">
                <div class="text-center mb-4">
                    <i class="bi bi-box-arrow-in-right display-4 text-primary"></i>
                    <h2 class="mt-3 font-weight-bold">Log In</h2>
                    <p class="text-muted">Welcome back to Health Helper</p>
                </div>
                <form method="POST">
                    {% csrf_token %}
                    <fieldset class="form-group mb-4">
                        {{ form.as_p }}
                    </fieldset>
                    <div class="d-grid gap-2">
                        <button class="btn btn-primary btn-lg btn-hover" type="submit">Log In</button>
                    </div>
                </form>
                <div class="border-top pt-4 mt-4 text-center">
                    <small class="text-muted">
                        Need An Account? <a class="text-decoration-none fw-bold" href="{% url 'register' %}">Sign Up Now</a>
                    </small>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
